steps:
# 1. Build imagen desde la carpeta backend
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t', 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest',
      '-f', 'backend/Dockerfile',
      './backend'
    ]

# 2. Push imagen
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest'
    ]

# 3. 🚀 Deploy a Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run',
      'deploy', # Usamos deploy en lugar de update para asegurar que se apliquen todos los cambios
      'api-skincare-v2',
      '--image=us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest',
      '--region=us-central1',
      '--platform=managed',

      # 🔥 CONEXIÓN A CLOUD SQL
      '--add-cloudsql-instances=api-de-skincare:us-central1:skincare',

      # 🔥 VARIABLES DE ENTORNO (Faltaba DB_NAME y PORT)
      '--set-env-vars=DB_NAME=skincare_db,DB_USER=postgres,DB_PASSWORD=Aa1002416662,INSTANCE_CONNECTION_NAME=api-de-skincare:us-central1:skincare,SPRING_PROFILES_ACTIVE=prod,PORT=8080',

      # 🔥 PERMITIR ACCESO
      '--allow-unauthenticated'
    ]

images:
- 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest'