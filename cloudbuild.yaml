steps:
 # 1. Compilar el proyecto
  - name: 'maven:3.9.6-eclipse-temurin-21'
    entrypoint: mvn
    args: ['clean', 'package', '-DskipTests']
    dir: 'backend'  # <--- ESTO ES VITAL
    
  # 2. Construir la imagen Docker (CAMBIADO AQUÍ)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t', 'us-central1-docker.pkg.dev/skincare-cloud/cloud-run-source-deploy/skincare-api:$COMMIT_SHA',
        '-t', 'us-central1-docker.pkg.dev/skincare-cloud/cloud-run-source-deploy/skincare-api:latest',
        '.',  # <--- IMPORTANTE: Punto para que Docker vea todo el proyecto
        '-f', 'backend/Dockerfile' # <--- Le decimos donde está el manual
      ]

  # 3. Push de la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        '--all-tags',
        'us-central1-docker.pkg.dev/skincare-cloud/cloud-run-source-deploy/skincare-api'
      ]

  # 4. Deploy a Cloud Run (CAMBIADO DB_NAME)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'services',
        'update',
        'skincare-api',
        '--image=us-central1-docker.pkg.dev/skincare-cloud/cloud-run-source-deploy/skincare-api:$COMMIT_SHA',
        '--region=us-central1',
        '--add-cloudsql-instances=skincare-cloud:us-central1:skincare-db',
        # Cambié DB_NAME=skincare por skincare_db para que coincida con tu pgAdmin
        '--set-env-vars=DB_NAME=skincare_db,DB_USER=postgres,DB_PASSWORD=Aa1002416662,INSTANCE_CONNECTION_NAME=skincare-cloud:us-central1:skincare-db',
        '--quiet'
      ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/skincare-cloud/cloud-run-source-deploy/skincare-api'