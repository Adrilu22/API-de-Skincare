steps:
# 0. Compilar (dentro de la carpeta backend)
- name: 'maven:3.9.6-eclipse-temurin-21'
  entrypoint: mvn
  args: ['clean', 'package', '-DskipTests']
  dir: 'backend'

# 1. Diagnóstico: Ver si el archivo JAR realmente existe
- name: 'ubuntu'
  args: ['ls', '-R', 'backend/target']

# 2. Construir la imagen Docker (CORREGIDO)
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t', 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:$COMMIT_SHA',
      '-t', 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest',
      '-f', 'backend/Dockerfile',
      'backend'
    ]

# 3. Push de la imagen
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      '--all-tags',
      'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api'
    ]

# 4. Deploy a Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    [
      'run',
      'services',
      'update',
      'skincare-api',
      '--image=us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:$COMMIT_SHA',
      '--region=us-central1',
      '--add-cloudsql-instances=api-de-skincare:us-central1:skincare',
      '--set-env-vars=DB_NAME=skincare_db,DB_USER=postgres,DB_PASSWORD=Aa1002416662,INSTANCE_CONNECTION_NAME=api-de-skincare:us-central1:skincare',
      '--quiet'
    ]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api'