spring.application.name=skincare-api

# Puerto dinámico (Cloud Run)
server.port=${PORT:8080}

# 🔥 Cloud SQL (AJUSTADO A TU PROYECTO)
spring.datasource.url=jdbc:postgresql:///skincare_db?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Pool y driver
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true