spring.application.name=skincare-api

# Puerto dinámico
server.port=${PORT:8080}

# Perfil
spring.profiles.active=prod

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Cloud SQL (ÚNICA CONFIG)
spring.datasource.url=jdbc:postgresql:///skincare_db?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2